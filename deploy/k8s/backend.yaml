apiVersion: apps/v1
kind: Deployment
metadata:
  name: flexiroaster-backend
  namespace: flexiroaster
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: flexiroaster-backend
  template:
    metadata:
      labels:
        app: flexiroaster-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/flexiroaster-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: flexiroaster-backend
  namespace: flexiroaster
spec:
  selector:
    app: flexiroaster-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
