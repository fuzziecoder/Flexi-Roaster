apiVersion: apps/v1
kind: Deployment
metadata:
  name: flexiroaster-frontend
  namespace: flexiroaster
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: flexiroaster-frontend
  template:
    metadata:
      labels:
        app: flexiroaster-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/your-org/flexiroaster-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: flexiroaster-frontend
  namespace: flexiroaster
spec:
  selector:
    app: flexiroaster-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
